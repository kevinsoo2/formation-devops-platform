# Render Blueprint - Déploiement automatique
# https://render.com/docs/blueprint-spec

services:
  - type: web
    name: formation-devops-api
    runtime: node
    plan: free
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: TURSO_DATABASE_URL
        sync: false
      - key: TURSO_AUTH_TOKEN
        sync: false
      - key: FRONTEND_URL
        sync: false
      - key: SEED_SECRET
        generateValue: true
